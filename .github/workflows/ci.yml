name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
      # The module owns the //go:embed of web/ and ships the structural fences
      # over the shipped SPA assets.
      - run: go build ./...
      - run: go test ./... -count=1

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The in-browser portable-evidence verifier suite + UI smokes. The
      # cinema-scenario gallery checks SKIP here (the gallery lives in the
      # Infrix monorepo); everything else runs in full.
      - run: node --test web/test/*.mjs
