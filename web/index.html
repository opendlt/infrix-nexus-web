<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus &mdash; Infrix Operations</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-text">INFRIX</span>
        <span class="logo-sub">Nexus</span>
      </div>
      <nav class="header-workspaces" aria-label="Workspaces">
        <a class="workspace-link" data-workspace="start"   href="#/start"   title="Start — choose your path (new here?)"><span class="workspace-link-label">Start</span></a>
        <a class="workspace-link" data-workspace="spine"   href="#/spine"   title="Cockpit — what needs attention now (g·l)"><span class="workspace-link-label">Cockpit</span></a>
        <a class="workspace-link" data-workspace="inbox"   href="#/inbox"   title="Inbox — approvals + assigned + mentions + handoffs + drafts (g·i)"><span class="workspace-link-label">Inbox</span><span class="workspace-link-badge" id="headerInboxBadge" hidden></span></a>
        <a class="workspace-link" data-workspace="compose" href="#/compose" title="Intent Studio — preview before submit (g·c)"><span class="workspace-link-label">Studio</span></a>
        <a class="workspace-link" data-workspace="govern"  href="#/govern"  title="Authority Atlas — actors / roles / capabilities / policies / trust / plugins (g·a)"><span class="workspace-link-label">Atlas</span></a>
        <a class="workspace-link" data-workspace="operate" href="#/operate" title="Operate Console — system health + governed action templates (g·o)"><span class="workspace-link-label">Console</span></a>
        <a class="workspace-link" data-workspace="prove"   href="#/prove"   title="Evidence Verifier — drop-zone offline verifier + bundle reader (g·p)"><span class="workspace-link-label">Verifier</span></a>
        <a class="workspace-link" data-workspace="agent"   href="#/agent"   title="Agent Mode — what an AI agent can do, and approve what it will do (nextux-01)"><span class="workspace-link-label">Agent</span></a>
        <a class="workspace-link" data-workspace="scenarios" href="#/scenarios" title="Scenario Builder — build, run, and share a verifiable proof story (nextux-02)"><span class="workspace-link-label">Scenarios</span></a>
      </nav>
      <div class="header-search">
        <input id="globalSearch" class="header-search-input" type="text"
               placeholder="Search intents, plans, hashes, accounts, blocks…"
               spellcheck="false" autocomplete="off">
        <div id="globalSearchResults" class="header-search-results" hidden></div>
      </div>
    </div>
    <div class="header-context">
      <div class="header-mode-toggle" id="headerModeToggle" role="group" aria-label="Mode">
          <button type="button" class="mode-btn" data-mode="guided" title="Guided — task-by-task in plain language">Guided</button>
          <button type="button" class="mode-btn" data-mode="expert" title="Expert — the full spine, evidence, policies, objects, anchors">Expert</button>
        </div>
        <div class="header-disclosure-wrap">
          <button type="button" class="header-disclosure" id="headerDisclosure" title="Switch acting identity + purpose" aria-haspopup="true" aria-expanded="false">
            <span class="header-disclosure-icon" aria-hidden="true">&#128100;</span>
            <span class="header-disclosure-actor mono" id="headerActor">&mdash;</span>
            <span class="header-disclosure-sep">·</span>
            <span class="header-disclosure-purpose" id="headerPurpose">&mdash;</span>
            <span class="header-disclosure-caret" aria-hidden="true">&#9662;</span>
          </button>
          <div class="header-popover" id="disclosurePopover" hidden>
            <label class="popover-label" for="disclosureActorInput">Acting as (ADI)</label>
            <input type="text" id="disclosureActorInput" class="popover-input mono" placeholder="acc://your-adi.acme" spellcheck="false" autocomplete="off">
            <label class="popover-label" for="disclosurePurposeInput">Purpose</label>
            <input type="text" id="disclosurePurposeInput" class="popover-input" placeholder="operational" spellcheck="false" autocomplete="off">
            <div class="popover-actions">
              <button type="button" class="popover-btn" id="disclosureApply">Switch identity</button>
            </div>
            <p class="popover-hint">The ADI must hold <code>explorer:view</code> or reads are denied.</p>
          </div>
        </div>
        <div class="header-pulse" id="headerPulse" title="Spine activity">
          <span class="header-pulse-dot"></span>
          <span class="header-pulse-label">live</span>
        </div>
        <div class="header-time-selector" id="headerTimeSelector"></div>
        <div class="status-indicator">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Connected</span>
        </div>
        <div class="block-height-display" id="blockHeightDisplay">
          Block <span id="headerBlockHeight">-</span>
        </div>
        <div class="header-theme-wrap">
          <button type="button" class="header-theme-btn" id="themeButton" title="Theme" aria-haspopup="true" aria-expanded="false" aria-label="Theme">&#127912;</button>
          <div class="header-popover theme-popover" id="themePopover" hidden>
            <button type="button" class="theme-option" data-theme="dark">Aurora</button>
            <button type="button" class="theme-option" data-theme="light">Daylight</button>
            <button type="button" class="theme-option" data-theme="contrast">Phosphor</button>
          </div>
        </div>
      </div>
  </div>
</header>

<!--
  Header workspace nav (Cockpit / Studio / Atlas / Console / Verifier)
  is the canonical navigation. Each workspace is a different lens over
  the same operations: cockpit watches health, studio composes new
  actions, atlas explores authority, console runs governed
  maintenance, verifier proves outcomes.
-->
<div id="view-container"></div>

<script type="module" src="/app.js"></script>

</body>
</html>
